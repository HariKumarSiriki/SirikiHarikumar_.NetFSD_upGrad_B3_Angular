<!DOCTYPE html>
<html>
<head>
    <title>Employee Filter</title>
</head>
<body>

<h2>Employee List</h2>
<hr>

<select id="jobSelect">
    <option>Please Select option </option>
    <option>All Employees</option>
    <option>Manager</option>
    <option>Salesman</option>
    <option>HR</option>
</select>

<button onclick="showEmployees()">Show Emps</button>

<br><br>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Job</th>
            <th>Salary</th>
        </tr>
    </thead>
    <tbody id="empBody"></tbody>
</table>

<script>


const employees = [
    { id:101, name:"Hari", job:"Manager", salary:50000 },
    { id:102, name:"Mani", job:"Salesman", salary:30000 },
    { id:103, name:"Kiran", job:"HR", salary:20000 },
    { id:104, name:"Shyam", job:"Manager", salary:55000 },
    { id:105, name:"Ravi", job:"Salesman", salary:32000 }
];

function showEmployees()
{
    const selectedJob = document.getElementById("jobSelect").value;

    let result;

   
    if(selectedJob === "All Employees")
        result = employees;
    else
       
        result = employees.filter(emp => emp.job === selectedJob);

    let rows = "";

    result.map(emp => {
        rows += `<tr><td>${emp.id}</td><td>${emp.name}</td><td>${emp.job}</td> <td>${emp.salary}</td></tr>`;
    });

    document.getElementById("empBody").innerHTML = rows;
}

</script>

</body>
</html>
