<!DOCTYPE html>
<html>
<head>
<title>GadgetHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


<div class="container text-bg-success mt-3 p-4 text-center border">
    <h1 class="display-4">Welcome to GadgetHub</h1>
</div>


<div class="container text-center mt-3">
    <button class="btn btn-primary">Home</button>
    <button class="btn btn-success">Products</button>
    <button class="btn btn-info">Cart</button>
</div>


<div class="container mt-4">
    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center p-3">
                <h5>Laptop</h5>
                <p>₹55,000</p>
                <button class="btn btn-primary mb-2">Add to Cart</button>
                <button class="btn btn-outline-success">View Details</button>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center p-3">
                <h5>Mobile</h5>
                <p>₹20,000</p>
                <button class="btn btn-primary mb-2">Add to Cart</button>
                <button class="btn btn-outline-success">View Details</button>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center p-3">
                <h5>Headphones</h5>
                <p>₹2,500</p>
                <button class="btn btn-primary mb-2">Add to Cart</button>
                <button class="btn btn-outline-success">View Details</button>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center p-3">
                <h5>Smart Watch</h5>
                <p>₹5,000</p>
                <button class="btn btn-primary mb-2">Add to Cart</button>
                <button class="btn btn-outline-success">View Details</button>
            </div>
        </div>

    </div>
</div>


<div class="container bg-light mt-5 p-3 border">
    <h2>Top Selling Products</h2>
    <table class="table">
        <tr class="table-primary">
            <th>Product</th>
            <th>Price</th>
        </tr>
        <tr class="table-success">
            <td>Laptop</td>
            <td>₹55,000</td>
        </tr>
        <tr class="table-info">
            <td>Mobile</td>
            <td>₹20,000</td>
        </tr>
    </table>
</div>

</body>
</html>
