<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

<title>College Event Dashboard</title>

<script>
function saveEvent()
{
  alert("Event saved successfully");

  var modalObj = document.getElementById('eventModal');
  var modal = bootstrap.Modal.getInstance(modalObj);
  modal.hide();
}

function validateForm()
{
  var formObj = document.getElementById("eventForm");
  formObj.classList.add("was-validated");
}
</script>
</head>

<body class="bg-light">


<nav class="fixed-top navbar navbar-expand-sm bg-info navbar-light">
<div class="container">
  <a class="navbar-brand"><i class="bi bi-calendar-event"></i> Events</a>

  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div id="menu" class="collapse navbar-collapse">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link">Events</a></li>
      <li class="nav-item"><a class="nav-link">Contact</a></li>
    </ul>
  </div>
</div>
</nav>

<br><br><br>

<div class="container">

<div class="d-flex justify-content-between align-items-center">
  <h3>College Event Dashboard</h3>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
    Add Event
  </button>
</div>

<hr>


<div class="row text-center">

<div class="col-sm-6 col-lg-3">
  <div class="border p-3 m-2 bg-white">
    <h5>Total Events</h5>
    <h2 class="text-primary">15</h2>
  </div>
</div>

<div class="col-sm-6 col-lg-3">
  <div class="border p-3 m-2 bg-white">
    <h5>Upcoming</h5>
    <h2 class="text-danger">5</h2>
  </div>
</div>

<div class="col-sm-6 col-lg-3">
  <div class="border p-3 m-2 bg-white">
    <h5>Completed</h5>
    <h2 class="text-success">10</h2>
  </div>
</div>

<div class="col-sm-6 col-lg-3">
  <div class="border p-3 m-2 bg-white">
    <h5>Participants</h5>
    <h2 class="text-warning">200</h2>
  </div>
</div>

</div>


<h4 class="mt-4">Upcoming Events</h4>
<table class="table table-bordered">
<tr>
  <th>Event</th><th>Date</th><th>Location</th>
</tr>
<tr>
  <td>Hackathon</td><td>10 May</td><td>Auditorium</td>
</tr>
<tr>
  <td>Tech Fest</td><td>20 May</td><td>Main Block</td>
</tr>
</table>

</div>

<div class="modal" id="eventModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
  <h5>Add Event</h5>
  <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<form id="eventForm" class="needs-validation">

<div class="mb-3">
<label>Event Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" class="form-control" required>
</div>

<div class="mb-3">
<label>Location</label>
<input type="text" class="form-control" required>
</div>

</form>
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
<button class="btn btn-success" onclick="validateForm(); saveEvent();">Save</button>
</div>

</div>
</div>
</div>

</body>
</html>
