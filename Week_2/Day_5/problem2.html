<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

<title>Ecommerce</title>

<style>
.hero{background:#0d6efd;color:white;padding:80px;text-align:center;}
</style>
</head>

<body>


<nav class="navbar navbar-dark bg-dark">
<div class="container">
  <a class="navbar-brand"><i class="bi bi-cart"></i> MyShop</a>

  <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#menu">
    <span class="navbar-toggler-icon"></span>
  </button>
</div>
</nav>

<div class="offcanvas offcanvas-end" id="menu">
<div class="offcanvas-header">
  <h5>Menu</h5>
  <button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>
<div class="offcanvas-body">
  <p>Home</p>
  <p>Products</p>
  <p>Contact</p>
</div>
</div>


<div class="hero">
<h1>Big Billion Sale</h1>
<p>Flat 50% OFF</p>
<button class="btn btn-light">Shop Now</button>
</div>


<div id="demo" class="carousel slide container mt-4" data-bs-ride="carousel">
<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://picsum.photos/1200/400?1" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://picsum.photos/1200/400?2" class="d-block w-100">
</div>

</div>
</div>


<div class="container mt-5">
<div class="row text-center">

<div class="col-md-4">
<div class="border p-3">
<h5>Headphones</h5>
<button class="btn btn-primary">Buy</button>
</div>
</div>

<div class="col-md-4">
<div class="border p-3">
<h5>Shoes</h5>
<button class="btn btn-primary">Buy</button>
</div>
</div>

<div class="col-md-4">
<div class="border p-3">
<h5>Watch</h5>
<button class="btn btn-primary">Buy</button>
</div>
</div>

</div>
</div>


<div class="bg-light text-center p-5 mt-5">
<h3> Enter Mail to Subscribe</h3>
<input class="form-control w-50 mx-auto mb-2" placeholder="Enter Email">
<button class="btn btn-primary">Subscribe</button>
</div>

</body>
</html>
