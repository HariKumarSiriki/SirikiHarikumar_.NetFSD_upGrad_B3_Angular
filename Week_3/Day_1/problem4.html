<!DOCTYPE html>
<html>
<head>
    <title>Interactive To-Do List</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:40px;
        }
        #taskInput{
            padding:8px;
            width:250px;
        }
        button{
            padding:8px 12px;
            margin-left:5px;
            cursor:pointer;
        }
        ul{
            list-style:none;
            padding:0;
            width:400px;
            margin:20px auto;
        }
        li{
            padding:10px;
            background:#f2f2f2;
            margin-bottom:8px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .completed{
            text-decoration: line-through;
            color:gray;
        }
        .deleteBtn{
            background:red;
            color:white;
            border:none;
            padding:5px 8px;
        }
    </style>
</head>

<body>

<h2>To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>

<h4>Total Tasks: <span id="totalCount">0</span></h4>
<h4>Completed Tasks: <span id="completedCount">0</span></h4>

<ul id="taskList"></ul>

<script>
$(document).ready(function(){

    function updateCount(){
        let total = $("#taskList li").length;
        let completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    // Add Task
    $("#addBtn").on("click", function(){

        let taskText = $("#taskInput").val().trim();

        if(taskText !== ""){
            let newTask = `
                <li>
                    <span class="taskText">${taskText}</span>
                    <button class="deleteBtn">Delete</button>
                </li>
            `;

            $("#taskList").append(newTask);
            $("#taskInput").val("");
            updateCount();
        }
    });

    // Mark Complete (Event Delegation)
    $("#taskList").on("click", ".taskText", function(){
        $(this).parent().toggleClass("completed");
        updateCount();
    });

    // Delete Task (Event Delegation)
    $("#taskList").on("click", ".deleteBtn", function(){
        $(this).parent().remove();
        updateCount();
    });

});
</script>

</body>
</html>
